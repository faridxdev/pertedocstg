{% load i18n %}
<div id="toast-container" class="fixed top-4 right-4 z-[100] space-y-3 pointer-events-none max-w-sm w-full">
  {% for message in messages %}
  <div class="pointer-events-auto
    {% if message.tags == 'success' %}toast-success{% elif message.tags == 'error' %}toast-error{% elif message.tags == 'warning' %}toast-warning{% else %}toast-info{% endif %}"
       x-data="{ show: true }" x-show="show"
       x-init="setTimeout(() => show = false, 5500)"
       x-transition:leave="transition ease-in duration-300"
       x-transition:leave-start="opacity-100 translate-x-0"
       x-transition:leave-end="opacity-0 translate-x-full"
       style="animation: slideInRight .3s ease-out">
    <div class="flex items-start gap-3">
      <div class="flex-shrink-0 mt-0.5">
        {% if message.tags == 'success' %}
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% elif message.tags == 'error' %}
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% elif message.tags == 'warning' %}
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.072 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
        {% else %}
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        {% endif %}
      </div>
      <p class="text-sm font-medium flex-1 leading-snug">{{ message }}</p>
      <button @click="show = false" class="flex-shrink-0 opacity-60 hover:opacity-100 transition-opacity ml-1">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
  {% endfor %}
</div>
