upstream pertedocstg_app {
    server web:8000 fail_timeout=0;
    keepalive 32;
}

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pertedocs.tg www.pertedocs.tg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pertedocs.tg www.pertedocs.tg;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/pertedocs.tg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pertedocs.tg/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/pertedocs.tg/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Sécurité ─────────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Tailles ──────────────────────────────────────────────────────────────
    client_max_body_size 25M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    keepalive_timeout 75s;

    # ── Fichiers statiques ────────────────────────────────────────────────────
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        gzip_static on;

        location ~* \.(css|js)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Fichiers media ────────────────────────────────────────────────────────
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
        # Bloquer l'exécution des fichiers uploadés
        location ~* \.(php|py|pl|sh|cgi)$ {
            deny all;
        }
    }

    # ── Application Django ────────────────────────────────────────────────────
    location / {
        proxy_pass http://pertedocstg_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;

        # Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    }

    # ── Health Check ──────────────────────────────────────────────────────────
    location /health/ {
        proxy_pass http://pertedocstg_app;
        access_log off;
    }

    # ── Robots.txt ────────────────────────────────────────────────────────────
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /admin/\nDisallow: /api/\nDisallow: /accounts/\nSitemap: https://pertedocs.tg/sitemap.xml\n";
    }

    # ── Bloquer accès sensibles ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|htaccess|htpasswd)$ {
        deny all;
    }

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/pertedocstg_access.log combined;
    error_log /var/log/nginx/pertedocstg_error.log warn;
}
